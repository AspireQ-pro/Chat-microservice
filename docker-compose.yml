version: "3.8"

services:
  chat-service:
    build: ./Backend
    container_name: chat-service
    ports:
      - "5000:5000"
    environment:
      # If PostgreSQL runs on your host machine (not in Docker):
      DATABASE_URL: "postgresql://postgres:postgres@host.docker.internal:5432/chat_db"
      PORT: "5000"
    volumes:
      - chat_uploads:/app/uploads
    restart: unless-stopped
    # If PostgreSQL is in a Docker container, uncomment below:
    # networks:
    #   - default
    #   - postgres_network

volumes:
  chat_uploads:

# If PostgreSQL is in Docker, add its network here:
# networks:
#   postgres_network:
#     external: true
#     name: <your-postgres-network-name>
