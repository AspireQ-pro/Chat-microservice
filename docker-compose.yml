version: "3.8"

services:
  chat-db:
    image: postgres:16-alpine
    container_name: chat-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Yogesh@1234
      POSTGRES_DB: chat_service
    volumes:
      - chat_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  chat-backend:
    build: ./Backend
    container_name: chat-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:Yogesh@1234@chat-db:5432/chat_service"
      BACKEND_URL: "http://localhost:5000"
      JWT_SECRET: "your-shared-secret-here"
      PORT: "5000"
    volumes:
      - chat_uploads:/app/uploads
    depends_on:
      chat-db:
        condition: service_healthy
    restart: unless-stopped

  chat-frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: "http://localhost:5000"
        VITE_SOCKET_URL: "http://localhost:5000"
    container_name: chat-frontend
    ports:
      - "3001:3001"
    depends_on:
      - chat-backend
    restart: unless-stopped

volumes:
  chat_db_data:
  chat_uploads:
